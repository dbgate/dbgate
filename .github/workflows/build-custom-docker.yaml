name: Build Custom Docker Image

on:
  workflow_dispatch:
  push:
    branches:
      - feat/oauth-userinfo

env:
  ECR_REGISTRY: 475538400403.dkr.ecr.eu-south-2.amazonaws.com
  ECR_REPOSITORY: automya/dbgate
  AWS_REGION: eu-south-2

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: adjustPackageJson
        run: node adjustPackageJson --community

      - name: yarn install
        run: yarn install

      - name: setCurrentVersion
        run: yarn setCurrentVersion

      - name: Prepare docker image
        run: yarn run prepare:docker

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::475538400403:role/github-actions-ecr-push
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          push: true
          context: ./docker
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:oauth-userinfo
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
          platforms: linux/amd64
