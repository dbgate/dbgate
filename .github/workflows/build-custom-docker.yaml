name: Build Custom Docker Image

on:
  push:
    branches:
      - feat/oauth-userinfo
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Sets useBundleExternals='true' so plugin webpack builds bundle
      # non-volatile deps (lodash, dbgate-tools, etc) into backend.js.
      # Also adds volatile plugin deps to packages/api/package.json.
      - name: Adjust package.json for Docker build
        run: node adjustPackageJson --community

      - name: Install dependencies
        run: yarn install

      - name: Prepare docker build
        run: yarn run prepare:docker

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::475538400403:role/github-actions-ecr-push
          aws-region: eu-south-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./docker
          push: true
          tags: 475538400403.dkr.ecr.eu-south-2.amazonaws.com/automya/dbgate:oauth-userinfo
