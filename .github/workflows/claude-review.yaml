name: Claude PR Review

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude:
    if: |
      contains(github.event.comment.body, '@claude review') &&
      (
        github.event.issue.pull_request ||
        github.event_name == 'pull_request_review_comment'
      ) &&
      contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: "https://github.com/anthropics/claude-code.git"
          plugins: "code-review@claude-code-plugins"
          prompt: |
            /code-review:code-review ${{ github.repository }}/pull/${{ github.event.issue.number || github.event.pull_request.number }}

            Review only concrete bugs, security issues, data-loss risks,
            SQL/database compatibility problems, and breaking changes.
            Do not comment on formatting, naming, or style-only issues.

            Always post a summary comment on the pull request when you finish,
            even if you found no issues. If there are no qualifying problems,
            post a short comment stating that the review found no concrete bugs,
            security issues, data-loss risks, SQL/database compatibility problems,
            or breaking changes.

            When enumerating findings, never use the "#<number>" form (e.g.
            "#1", "#2"), because GitHub auto-links it to unrelated issues or
            pull requests. Number findings as "1.", "2.", "3." or "Fix 1:",
            "Fix 2:" instead. Only write "#<number>" when you deliberately mean
            to reference a specific existing issue or pull request.
          claude_args: |
            --max-turns 40
            --model sonnet
